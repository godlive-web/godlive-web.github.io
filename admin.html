<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>神界阁管理系统</title>
  <link rel="icon" href="https://raw.githubusercontent.com/godlive-web/godlive-web.github.io/main/godliveicon.png" type="image/png">
  <!-- 引入bcryptjs库用于密码验证 -->
  <script src="https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/dist/bcrypt.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    :root {
      --bg-primary: #f8f9fa;
      --bg-secondary: #ffffff;
      --text-primary: #212529;
      --text-secondary: #495057;
      --accent-color: #6f42c1;
      --accent-light: #e0d6ff;
      --border-color: #dee2e6;
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.1);
      --card-bg: #ffffff;
      --header-bg: rgba(255, 255, 255, 0.95);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-primary: #0c0c1e;
        --bg-secondary: #1a1a3a;
        --text-primary: #e0e0ff;
        --text-secondary: #a0a0ff;
        --accent-color: #8a63d2;
        --accent-light: rgba(100, 80, 255, 0.2);
        --border-color: rgba(100, 80, 255, 0.3);
        --shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        --card-bg: rgba(20, 20, 45, 0.8);
        --header-bg: rgba(15, 15, 35, 0.95);
      }
    }
    body {
      font-family: "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
      color: var(--text-primary);
      transition: background 0.3s ease, color 0.3s ease;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .login-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-card {
      background: var(--card-bg);
      border-radius: 12px;
      box-shadow: var(--shadow);
      padding: 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      border: 1px solid var(--border-color);
    }
    .login-card h2 {
      margin-bottom: 30px;
      color: var(--accent-color);
      font-size: 24px;
    }
    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }
    .form-label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: var(--text-primary);
    }
    .form-input {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-size: 14px;
      transition: all 0.2s ease;
    }
    .form-input:focus {
      outline: none;
      border-color: var(--accent-color);
      box-shadow: 0 0 0 3px var(--accent-light);
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 24px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
    }
    .btn-primary {
      background: linear-gradient(135deg, #8a63d2 0%, #6f42c1 100%);
      color: white;
    }
    .btn-primary:hover {
      background: linear-gradient(135deg, #7a53c2 0%, #5a32a1 100%);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(138, 99, 210, 0.5);
    }
    .btn-secondary {
      background: var(--bg-secondary);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
    }
    .btn-secondary:hover {
      background: var(--bg-primary);
      border-color: var(--accent-color);
    }
    .btn-block {
      width: 100%;
    }
    .header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 70px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 25px;
      background: var(--header-bg);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      z-index: 999;
      border-bottom: 1px solid var(--border-color);
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 15px;
      cursor: pointer;
      text-decoration: none;
    }
    .logo {
      height: 45px;
      width: auto;
    }
    .site-title {
      position: relative;
      font-size: 24px;
      font-weight: bold;
      color: var(--text-primary);
      text-shadow: 0 0 10px rgba(111, 66, 193, 0.3);
    }
    .admin-badge {
      position: absolute;
      top: -8px;
      left: -20px;
      font-size: 10px;
      background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
      padding: 2px 6px;
      border-radius: 4px;
      transform: rotate(-15deg);
      color: white;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .user-info {
      font-size: 14px;
      color: var(--text-secondary);
    }
    .main-container {
      display: flex;
      margin-top: 70px;
      min-height: calc(100vh - 70px);
    }
    .sidebar {
      width: 250px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border-color);
      padding: 20px 0;
      position: fixed;
      height: calc(100vh - 70px);
      overflow-y: auto;
    }
    .sidebar-item {
      padding: 15px 20px;
      cursor: pointer;
      transition: all 0.2s ease;
      border-left: 3px solid transparent;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .sidebar-item:hover {
      background: var(--accent-light);
      border-left-color: var(--accent-color);
    }
    .sidebar-item.active {
      background: var(--accent-light);
      border-left-color: var(--accent-color);
      color: var(--accent-color);
    }
    .content {
      flex: 1;
      padding: 30px;
      margin-left: 250px;
      min-height: calc(100vh - 70px);
    }
    .content-section {
      background: var(--card-bg);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 25px;
      margin-bottom: 20px;
      border: 1px solid var(--border-color);
    }
    .content-section h2 {
      margin-bottom: 20px;
      color: var(--accent-color);
      font-size: 20px;
    }
    .content-section p {
      margin-bottom: 20px;
      color: var(--text-secondary);
    }
    .table-container {
      overflow-x: auto;
      margin-bottom: 20px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid var(--border-color);
    }
    th {
      background: var(--accent-light);
      font-weight: 600;
      color: var(--accent-color);
    }
    tr:hover {
      background: var(--bg-primary);
    }
    .btn-group {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .btn-sm {
      padding: 6px 12px;
      font-size: 12px;
    }
    .form-row {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .form-col {
      flex: 1;
      min-width: 200px;
    }
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }
    .modal.show {
      opacity: 1;
      visibility: visible;
    }
    .modal-content {
      background: var(--card-bg);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 30px;
      width: 100%;
      max-width: 500px;
      transform: translateY(-20px);
      transition: transform 0.3s ease;
      border: 1px solid var(--border-color);
    }
    .modal.show .modal-content {
      transform: translateY(0);
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .modal-header h3 {
      color: var(--accent-color);
      font-size: 18px;
    }
    .close-btn {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: var(--text-secondary);
      padding: 0;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .close-btn:hover {
      color: var(--text-primary);
    }
    .modal-footer {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 20px;
    }
    .status-badge {
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
    }
    .status-pending {
      background: #fff3cd;
      color: #856404;
    }
    .status-approved {
      background: #d4edda;
      color: #155724;
    }
    .status-rejected {
      background: #f8d7da;
      color: #721c24;
    }
    .status-using {
      background: #d1ecf1;
      color: #0c5460;
    }
    .status-discarded {
      background: #e2e3e5;
      color: #383d41;
    }
    .question-section {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .question-col {
      flex: 1;
      min-width: 300px;
      background: var(--bg-secondary);
      border-radius: 8px;
      padding: 20px;
      border: 1px solid var(--border-color);
    }
    .question-item {
      background: var(--card-bg);
      border-radius: 6px;
      padding: 15px;
      margin-bottom: 10px;
      border: 1px solid var(--border-color);
      transition: all 0.2s ease;
    }
    .question-item:hover {
      box-shadow: var(--shadow);
    }
    .question-item.selected {
      border-color: var(--accent-color);
      background: var(--accent-light);
    }
    .question-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .question-id {
      font-weight: 600;
      color: var(--accent-color);
    }
    .question-content {
      margin-bottom: 10px;
      line-height: 1.5;
    }
    .question-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .error-message {
      color: #dc3545;
      font-size: 14px;
      margin-top: 10px;
      text-align: center;
    }
    @media (max-width: 768px) {
      .sidebar {
        width: 200px;
      }
      .content {
        margin-left: 200px;
        padding: 20px;
      }
      .form-row {
        flex-direction: column;
      }
      .btn-group {
        flex-direction: column;
      }
      .question-section {
        flex-direction: column;
      }
    }
    @media (max-width: 480px) {
      .sidebar {
        width: 100%;
        height: auto;
        position: relative;
        border-right: none;
        border-bottom: 1px solid var(--border-color);
      }
      .content {
        margin-left: 0;
        padding: 15px;
      }
      .login-card {
        padding: 30px;
      }
      .form-col {
        min-width: 100%;
      }
    }
  </style>
</head>
<body>
  <!-- 登录页面 -->
  <div id="loginPage" class="login-container">
    <div class="login-card">
      <h2>神界阁管理系统</h2>
      <div class="form-group">
        <label class="form-label" for="userId">用户ID</label>
        <input type="text" id="userId" class="form-input" placeholder="请输入用户ID" />
      </div>
      <div class="form-group">
        <label class="form-label" for="userPassword">密码</label>
        <input type="password" id="userPassword" class="form-input" placeholder="请输入密码" />
      </div>
      <div class="error-message" id="loginError"></div>
      <button class="btn btn-primary btn-block" id="loginBtn">登录</button>
    </div>
  </div>

  <!-- 管理系统主界面 -->
  <div id="adminPage" style="display: none;">
    <!-- 顶部导航 -->
    <header class="header">
      <div class="header-left">
        <img src="https://raw.githubusercontent.com/godlive-web/godlive-web.github.io/refs/heads/file/%E7%A5%9E%E7%95%8C%E5%AE%98%E7%BD%91icon_20240814_181538_0000.png" alt="神界阁Logo" class="logo">
        <div class="site-title">
          <span class="admin-badge">Admin</span>
          神界阁管理系统
        </div>
      </div>
      <div class="header-right">
        <div class="user-info" id="userInfo">欢迎，管理员</div>
        <button class="btn btn-secondary btn-sm" id="logoutBtn">退出登录</button>
      </div>
    </header>

    <!-- 主容器 -->
    <div class="main-container">
      <!-- 侧边栏 -->
      <aside class="sidebar">
        <div class="sidebar-item active" data-section="members">
          <span>👥</span>
          成员管理
        </div>
        <div class="sidebar-item" data-section="questions">
          <span>📝</span>
          题库管理
        </div>
        <div class="sidebar-item" data-section="publish">
          <span>🚀</span>
          发布与管理题库答题
        </div>
      </aside>

      <!-- 内容区 -->
      <main class="content">
        <!-- 成员管理 -->
        <section id="membersSection" class="content-section">
          <h2>成员管理</h2>
          <p>管理神界阁成员信息，包括添加、修改、删除成员。</p>
          
          <div class="btn-group">
            <button class="btn btn-primary" id="addMemberBtn">添加成员</button>
            <button class="btn btn-secondary" id="refreshMembersBtn">刷新数据</button>
          </div>

          <div class="table-container">
            <table id="membersTable">
              <thead>
                <tr>
                  <th>用户ID</th>
                  <th>账号名称</th>
                  <th>自设名称</th>
                  <th>入圈时间</th>
                  <th>账号状态</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="membersTableBody">
                <tr>
                  <td colspan="6" style="text-align: center; padding: 40px;">加载中...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>

        <!-- 题库管理 -->
        <section id="questionsSection" class="content-section" style="display: none;">
          <h2>题库管理</h2>
          <p>管理神界阁入圈题库，包括添加、删除、标记题目状态。</p>

          <div class="btn-group">
            <button class="btn btn-primary" id="addKQuestionBtn">添加客观题</button>
            <button class="btn btn-primary" id="addZQuestionBtn">添加主观题</button>
            <button class="btn btn-secondary" id="refreshQuestionsBtn">刷新数据</button>
          </div>

          <div class="question-section">
            <!-- 客观题 -->
            <div class="question-col">
              <h3>客观题 (K.json)</h3>
              <div id="kQuestionsList"></div>
            </div>
            
            <!-- 主观题 -->
            <div class="question-col">
              <h3>主观题 (Z.json)</h3>
              <div id="zQuestionsList"></div>
            </div>
          </div>
        </section>

        <!-- 发布与管理题库答题 -->
        <section id="publishSection" class="content-section" style="display: none;">
          <h2>发布与管理题库答题</h2>
          <p>发布题库给成员并管理待审核的答题。</p>

          <div class="question-section">
            <!-- 发布题库 -->
            <div class="question-col">
              <h3>发布题库</h3>
              <div class="form-group">
                <label class="form-label" for="publishUserId">选择用户</label>
                <select id="publishUserId" class="form-input">
                  <option value="">请选择用户</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">选择题目</label>
                <div id="publishQuestionsList"></div>
              </div>
              <div class="btn-group">
                <button class="btn btn-primary" id="publishBtn">发布</button>
                <button class="btn btn-secondary" id="cancelPublishBtn">取消</button>
              </div>
            </div>

            <!-- 管理待审核答题 -->
            <div class="question-col">
              <h3>管理待审核答题</h3>
              <div id="pendingAnswersList"></div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <!-- 成员编辑模态框 -->
  <div id="memberModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="memberModalTitle">编辑成员</h3>
        <button class="close-btn" id="closeMemberModal">&times;</button>
      </div>
      <form id="memberForm">
        <input type="hidden" id="memberId">
        <div class="form-row">
          <div class="form-col">
            <div class="form-group">
              <label class="form-label" for="memberUser">用户ID</label>
              <input type="text" id="memberUser" class="form-input" placeholder="用户ID">
            </div>
          </div>
          <div class="form-col">
            <div class="form-group">
              <label class="form-label" for="memberAccountName">账号名称</label>
              <input type="text" id="memberAccountName" class="form-input" placeholder="账号名称">
            </div>
          </div>
        </div>
        <div class="form-row">
          <div class="form-col">
            <div class="form-group">
              <label class="form-label" for="memberSelfName">自设名称</label>
              <input type="text" id="memberSelfName" class="form-input" placeholder="自设名称">
            </div>
          </div>
          <div class="form-col">
            <div class="form-group">
              <label class="form-label" for="memberJoinTime">入圈时间</label>
              <input type="text" id="memberJoinTime" class="form-input" placeholder="入圈时间">
            </div>
          </div>
        </div>
        <div class="form-row">
          <div class="form-col">
            <div class="form-group">
              <label class="form-label" for="memberAddress">模糊住址</label>
              <input type="text" id="memberAddress" class="form-input" placeholder="模糊住址">
            </div>
          </div>
          <div class="form-col">
            <div class="form-group">
              <label class="form-label" for="memberBirthDate">出生日期</label>
              <input type="text" id="memberBirthDate" class="form-input" placeholder="出生日期">
            </div>
          </div>
        </div>
        <div class="form-row">
          <div class="form-col">
            <div class="form-group">
              <label class="form-label" for="memberStatus">账号状态</label>
              <input type="text" id="memberStatus" class="form-input" placeholder="账号状态">
            </div>
          </div>
          <div class="form-col">
            <div class="form-group">
              <label class="form-label" for="memberPassword">账号密码</label>
              <input type="text" id="memberPassword" class="form-input" placeholder="账号密码">
            </div>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="memberIntro">个人介绍</label>
          <input type="text" id="memberIntro" class="form-input" placeholder="个人介绍">
        </div>
        <div class="form-group">
          <label class="form-label" for="memberAchievements">认证成就</label>
          <input type="text" id="memberAchievements" class="form-input" placeholder="认证成就">
        </div>
        <div class="form-group">
          <label class="form-label" for="memberExam">使用题库</label>
          <input type="text" id="memberExam" class="form-input" placeholder="使用题库">
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" id="closeMemberModalBtn">取消</button>
          <button type="submit" class="btn btn-primary" id="saveMemberBtn">保存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 题目编辑模态框 -->
  <div id="questionModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="questionModalTitle">编辑题目</h3>
        <button class="close-btn" id="closeQuestionModal">&times;</button>
      </div>
      <form id="questionForm">
        <input type="hidden" id="questionType">
        <input type="hidden" id="questionIndex">
        <div class="form-group">
          <label class="form-label" for="questionId">题目ID</label>
          <input type="text" id="questionId" class="form-input" placeholder="题目ID">
        </div>
        <div class="form-group">
          <label class="form-label" for="questionContent">题目内容</label>
          <input type="text" id="questionContent" class="form-input" placeholder="题目内容">
        </div>
        <div class="form-group">
          <label class="form-label" for="questionStatus">题目状态</label>
          <select id="questionStatus" class="form-input">
            <option value="待使用">待使用</option>
            <option value="使用中">使用中</option>
            <option value="废弃">废弃</option>
          </select>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" id="closeQuestionModalBtn">取消</button>
          <button type="submit" class="btn btn-primary" id="saveQuestionBtn">保存</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // 允许登录的用户ID列表（在这里添加允许登录的用户ID）
    const ALLOWED_USERS = ['051809'];

    // 当前登录用户
    let currentUser = null;

    // 成员数据
    let membersData = [];

    // 题库数据
    let kQuestionsData = [];
    let zQuestionsData = [];

    // 初始化
    document.addEventListener('DOMContentLoaded', function() {
      initLogin();
      initAdmin();

    // 登录功能
    function initLogin() {
      const loginBtn = document.getElementById('loginBtn');
      const userId = document.getElementById('userId');
      const userPassword = document.getElementById('userPassword');
      const loginError = document.getElementById('loginError');

      loginBtn.addEventListener('click', async function() {
        const id = userId.value.trim();
        const password = userPassword.value.trim();

        if (!id || !password) {
          loginError.textContent = '请输入用户ID和密码';
          return;
        }

        if (!ALLOWED_USERS.includes(id)) {
          loginError.textContent = '该用户无权限登录';
          return;
        }

        try {
          // 使用Vercel API获取用户数据（私有仓库无法直接访问GitHub Raw）
          const VERCEL_DOMAIN = 'https://godlive-web-github-io.vercel.app';
          const response = await fetch(`${VERCEL_DOMAIN}/api/getUserInfo?userId=${encodeURIComponent(id)}`);
          if (!response.ok) {
            throw new Error('获取用户数据失败');
          }

          const result = await response.json();
          if (!result.success) {
            throw new Error(result.msg || '获取用户数据失败');
          }

          const userData = result.data;
          // 使用bcrypt验证密码（数据库中存储的是哈希值）
          const isPasswordValid = dcodeIO.bcrypt.compareSync(password, userData['账号密码']);
          if (!isPasswordValid) {
            loginError.textContent = '密码错误';
            return;
          }

          // 登录成功
          currentUser = userData;
          document.getElementById('userInfo').textContent = `欢迎，${userData['自设名称']}`;
          document.getElementById('loginPage').style.display = 'none';
          document.getElementById('adminPage').style.display = 'block';

          // 加载成员数据（完成后自动加载发布数据）
          await loadMembers();
          await loadQuestions();
          await loadPublishData();
        } catch (error) {
          console.error('登录失败:', error);
          loginError.textContent = '登录失败，请重试';
        }
      });
    }

    // 加载成员数据
    async function loadMembers() {
      const tableBody = document.getElementById('membersTableBody');
      tableBody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 40px;">加载中...</td></tr>';

      try {
        // 使用Vercel API获取所有用户ID（私有仓库无法直接访问GitHub Raw）
        const VERCEL_DOMAIN = 'https://godlive-web-github-io.vercel.app';
        const usersResponse = await fetch(`${VERCEL_DOMAIN}/api/getAllUserIDs`);
        if (!usersResponse.ok) {
          throw new Error('获取用户列表失败');
        }

        const usersResult = await usersResponse.json();
        if (!usersResult.success || !usersResult.data.length) {
          throw new Error('未找到用户数据');
        }

        const users = usersResult.data;
        const members = [];

        for (const user of users) {
          try {
            const response = await fetch(`${VERCEL_DOMAIN}/api/getUserInfo?userId=${encodeURIComponent(user)}`);
            if (response.ok) {
              const result = await response.json();
              if (result.success && result.data) {
                members.push(result.data);
              }
            }
          } catch (error) {
            console.log(`加载用户 ${user} 失败:`, error);
          }
        }

        membersData = members;
        renderMembersTable();
      } catch (error) {
        console.error('加载成员数据失败:', error);
        tableBody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 40px; color: #dc3545;">加载失败，请重试</td></tr>';
      }
    }

    // 按子分类分组题目
    function groupQuestionsByCategory(questions) {
      const groups = {};
      questions.forEach(q => {
        const match = q.id.match(/^([KZ]-[A-Z])\//);
        const category = match ? match[1] : '其他';
        if (!groups[category]) groups[category] = [];
        groups[category].push(q);
      });
      return groups;
    }

    // 解析答题内容
    function parseExamContent(examStr) {
      // 格式1：K-H/01：不正确；Z-J/01：略，待审核（无答题时间）
      // 格式2：K-H/01：不正确；Z-J/01：略（答题时间：2026.3.3，待审核）
      const result = {
        questions: [],
        answerTime: '',
        status: ''
      };

      if (!examStr || examStr === '；（答题时间：）') return result;

      // 提取答题时间和状态（如果有）
      const timeMatch = examStr.match(/（答题时间：([^，]*)，([^）]+)）/);
      if (timeMatch) {
        result.answerTime = timeMatch[1];
        result.status = timeMatch[2];
      } else {
        // 检查是否有状态（如"，待审核"）
        const statusMatch = examStr.match(/，(待审核|已审核通过|审核不通过)$/);
        if (statusMatch) {
          result.status = statusMatch[1];
        }
      }

      // 提取题目和答案
      let contentPart = examStr;
      if (examStr.includes('（')) {
        contentPart = examStr.split('（')[0];
      }
      // 移除开头的；和结尾的状态
      contentPart = contentPart.replace(/^；/, '').replace(/，(待审核|已审核通过|审核不通过)$/, '');

      const questionParts = contentPart.split('；');

      questionParts.forEach(part => {
        if (!part.trim()) return;
        const match = part.match(/^([^：]+)：(.+)$/);
        if (match) {
          const questionId = match[1].trim();
          const answer = match[2].trim();

          // 查找题目内容
          let questionContent = '';
          const kQ = kQuestionsData.find(q => q.id === questionId);
          const zQ = zQuestionsData.find(q => q.id === questionId);
          if (kQ) questionContent = kQ.content;
          else if (zQ) questionContent = zQ.content;

          result.questions.push({
            id: questionId,
            content: questionContent,
            answer: answer
          });
        }
      });

      return result;
    }

    // 加载待审核答题
    function loadPendingAnswers() {
      const pendingList = document.getElementById('pendingAnswersList');
      pendingList.innerHTML = '';

      const pendingMembers = membersData.filter(member => {

        let questionsHtml = '';
        examData.questions.forEach((q, idx) => {
          questionsHtml += `

              <div style="font-weight: 600; color: var(--accent-color); margin-bottom: 5px;">

                ${q.content || '（题库中未找到该题目）'}
              </div>

                <span style="color: var(--text-secondary); font-size: 12px;">用户答案：</span>
                <span style="color: var(--text-primary); font-weight: 500;">${q.answer}</span>
              </div>
            </div>
          `;
        });

        item.innerHTML = `
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid var(--border-color);">
            <div>
              <span style="font-weight: 600; font-size: 16px; color: var(--text-primary);">用户ID：${member.user}</span>
              <span style="margin-left: 10px; color: var(--text-secondary);">(${member['自设名称'] || '无昵称'})</span>
            </div>
            <span class="status-badge status-pending">待审核</span>
          </div>
          <div style="margin-bottom: 10px; color: var(--text-secondary); font-size: 13px;">
            答题时间：${examData.answerTime}
          </div>
          <div style="margin-bottom: 15px;">
            ${questionsHtml}
          </div>
          <div style="display: flex; gap: 10px; justify-content: flex-end;">
            <button class="btn btn-primary btn-sm approve-answer" data-id="${member.user}">✓ 审核通过</button>
            <button class="btn btn-secondary btn-sm reject-answer" data-id="${member.user}">✗ 审核不通过</button>
          </div>
        `;
        pendingList.appendChild(item);
      });

      // 添加审核事件
      document.querySelectorAll('.approve-answer').forEach(btn => {
        btn.addEventListener('click', function() {
          const id = this.dataset.id;
          updateAnswerStatus(id, '已审核通过');
        });
      });

      document.querySelectorAll('.reject-answer').forEach(btn => {
        btn.addEventListener('click', function() {
          const id = this.dataset.id;
          updateAnswerStatus(id, '审核不通过');
        });
      });
    }

    // 加载发布题目列表
    function loadPublishQuestions() {
      const publishList = document.getElementById('publishQuestionsList');
      publishList.innerHTML = '';

      // 客观题
      const kSection = document.createElement('div');
      kSection.innerHTML = '<h4>客观题</h4>';
      kQuestionsData.forEach((question, index) => {
        const item = document.createElement('div');
        item.className = 'question-item';
        item.innerHTML = `
          <div class="question-header">
            <span class="question-id">${question.id}</span>
            <span class="status-badge status-${question.status === '待使用' ? 'pending' : question.status === '使用中' ? 'using' : 'discarded'}">${question.status}</span>
            <input type="checkbox" class="publish-question" data-type="K" data-index="${index}">
          </div>
          <div class="question-content">${question.content}</div>
        `;
        kSection.appendChild(item);
      });
      publishList.appendChild(kSection);

      // 主观题
      const zSection = document.createElement('div');
      zSection.innerHTML = '<h4>主观题</h4>';
      zQuestionsData.forEach((question, index) => {
        const item = document.createElement('div');
        item.className = 'question-item';
        item.innerHTML = `
          <div class="question-header">
            <span class="question-id">${question.id}</span>
            <span class="status-badge status-${question.status === '待使用' ? 'pending' : question.status === '使用中' ? 'using' : 'discarded'}">${question.status}</span>
            <input type="checkbox" class="publish-question" data-type="Z" data-index="${index}">
          </div>
          <div class="question-content">${question.content}</div>
        `;
        zSection.appendChild(item);
      });
      publishList.appendChild(zSection);
    }

    // 更新答题状态
    async function updateAnswerStatus(userId, status) {
      const member = membersData.find(m => m.user === userId);
      if (!member) return;

      let exam = member['使用题库'] || '';
      exam = exam.replace('待审核', status);
      member['使用题库'] = exam;

      // 推送到GitHub
      const success = await saveUserExamToGitHub(userId, exam);
      if (success) {
        loadPendingAnswers();
      }
    }

    // 保存用户题库到GitHub
    async function saveUserExamToGitHub(userId, examData) {
      try {
        const VERCEL_DOMAIN = 'https://godlive-web-github-io.vercel.app';
        const response = await fetch(`${VERCEL_DOMAIN}/api/updateUserExam`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId, examData })
        });

        const result = await response.json();
        if (!result.success) {
          alert('保存失败：' + result.msg);
          return false;
        }
        return true;
      } catch (error) {
        console.error('保存用户题库失败:', error);
        alert('保存失败，请检查网络连接');
        return false;
      }
    }

    // 发布题库
    async function publishExam() {
      const userId = document.getElementById('publishUserId').value;
      if (!userId) {
        alert('请选择用户');
        return;
      }

      const selectedQuestions = [];
      document.querySelectorAll('.publish-question:checked').forEach(checkbox => {
        const type = checkbox.dataset.type;
        const index = parseInt(checkbox.dataset.index);
        const questions = type === 'K' ? kQuestionsData : zQuestionsData;
        if (questions[index]) {
          selectedQuestions.push(questions[index]);
        }
      });

      if (selectedQuestions.length === 0) {
        alert('请选择题目');
        return;
      }

      // 生成题库内容（格式：K-H/01：不正确；Z-J/01：略，待审核）
      const kQuestions = selectedQuestions.filter(q => q.id.startsWith('K-'));
      const zQuestions = selectedQuestions.filter(q => q.id.startsWith('Z-'));

      let examContent = '；';
      kQuestions.forEach((q, idx) => {
        examContent += `${q.id}：不正确`;
        if (idx < kQuestions.length - 1 || zQuestions.length > 0) {
          examContent += '；';
        }
      });
      zQuestions.forEach((q, idx) => {
        examContent += `${q.id}：略`;
        if (idx < zQuestions.length - 1) {
          examContent += '；';
        }
      });
      examContent += '，待审核';

      // 更新用户数据
      const member = membersData.find(m => m.user === userId);
      if (member) {
        member['使用题库'] = examContent;

        // 推送到GitHub
        const success = await saveUserExamToGitHub(userId, examContent);
        if (success) {
          alert('题库发布成功');
          cancelPublish();
          loadPendingAnswers();
        }
      }
    }

    // 取消发布
    function cancelPublish() {
      document.getElementById('publishUserId').value = '';
      document.querySelectorAll('.publish-question:checked').forEach(checkbox => {
        checkbox.checked = false;
      });
    }
  </script>
</body>
</html>
